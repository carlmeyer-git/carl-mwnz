name: Build and Publish

on:
  push:
    branches:
      - main      
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: .NET audit
        run: |
          dotnet restore Mwnz.slnx
          dotnet list package --vulnerable --include-transitive

      - name: Build Docker images
        run: docker compose build

      - name: Start API container
        run: docker compose up -d

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs
          exit 1

      - name: Run .NET tests
        id: dotnet-test
        run: |
          dotnet test Mwnz.slnx --no-restore --verbosity normal \
            --results-directory TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Publish .NET test results
        if: always() && !cancelled()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: TestResults/**/*.trx
          check_name: .NET test results

      - name: Smoke test containerized API
        if: steps.dotnet-test.outcome == 'success'
        run: |
          {
            echo "## Smoke tests"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          smoke() {
            local name="$1"
            shift
            if "$@"; then
              echo "| ${name} | Pass |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| ${name} | Fail |" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi
          }

          smoke "GET /health" \
            bash -c 'curl -sf http://localhost:8080/health | grep -q healthy'
          smoke "GET /openapi/v1.yaml" \
            bash -c 'curl -sf http://localhost:8080/openapi/v1.yaml | grep -q "openapi: \"3.0.2\""'
          smoke "GET /v1/companies/1" \
            bash -c 'curl -sf http://localhost:8080/v1/companies/1 | grep -q MWNZ'
          smoke "GET /v1/companies/2" \
            bash -c 'curl -sf http://localhost:8080/v1/companies/2 | grep -q Other'

      - name: Stop API container
        if: always()
        run: docker compose down

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish to Docker registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag carlpetermeyer/mwnz-api:latest "carlpetermeyer/mwnz-api:${{ github.run_number }}"
          docker push carlpetermeyer/mwnz-api:latest
          docker push "carlpetermeyer/mwnz-api:${{ github.run_number }}"

      - name: Published image summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo "## Published Docker images"
            echo ""
            echo "| Image |"
            echo "|-------|"
            echo "| \`carlpetermeyer/mwnz-api:latest\` |"
            echo "| \`carlpetermeyer/mwnz-api:${{ github.run_number }}\` |"
            echo ""
            echo "Hub: https://hub.docker.com/r/carlpetermeyer/mwnz-api"
          } >> "$GITHUB_STEP_SUMMARY"
